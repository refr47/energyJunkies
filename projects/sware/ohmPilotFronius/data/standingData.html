<!DOCTYPE html>

<html>

<script src="js/jquery-3.7.1.min.js"></script>
 <script src="js/datatables.min.js"></script>
<script>
$(document).ready(function(){
  $("#headerContent").load("headerF.html #headerSection");
  document.title = 'Stammdatenverwaltung';
      var data = $('#stamm').DataTable({
    "dom": 'r',
    "lengthChange": false,
    "info": false,
    "bPaginate": false,
    "responsive": true,
        columns: [
        {title: 'Titel'},
        {
          title: 'Wert',
          //user 'render' to append Edit/Delete buttons for each entry
          render: data => `${data}<td><button action="edit">Edit</button></td>`
        }
  ]
  });
  $(".dataTables_filter").hide();

$('#addRow').on('click', function() {

  //when submit button acts to submit edits
  if($(this).attr('action') == 'confirmEdit'){
    //change affected row data and re-draw the table
    data.row($(this).attr('rowindex')).data([$("#theTitle").val(), $("#theValue").val()]).draw();
  }
  //clean up form, switch it to default state
  $('#theTitle').val("");
  $('#theValue').val("");
  
});

  //'Edit' button click handler
$('#stamm').on('click', 'tbody tr button[action="edit"]', function(){
  //get affected row entry
  const row = data.row($(event.target).closest('tr'));
  //get affected row().index() and append that to 'Submit' button attributes
  //you may use global variable for that purpose if you prefer
  $('#addRow').attr('rowindex', row.index());
  //switch 'Submit' button role to 'confirmEdit'
  $('#addRow').attr('action', 'confirmEdit');
  //set up 'Type' and 'Amount' values according to the selected entry
  $('#theTitle').val(row.data()[0]);
  $('#theValue').val(row.data()[1]);
});
});
</script>
<style>
  tbody tr button {
    display: block;
    float: right;
}
#editBlock {
    display: flex;
    list-style: none;
    margin-left:auto;
    margin-right:auto;
    margin-top: 1rem;
    align-items: center;
    width: 90%;
    justify-content: space-between;
}
input[type="text"] {
    width: 40%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 3px;
    margin-bottom: 15px;
}
</style>
<div id="headerContent"></div>


<body>
<h1>Stammdaten</h1>
<div id="editBlock">
  <label>Titel</label>
  <input type="text" id="theTitle" />
   <label>Ausprägung</label>
  <input type="text" id="theValue" />
<button id="addRow"> Update </button>
</div>
<table id="stamm" class="stripe display" cellspacing="0" style="width:60%">
        <thead>
            <tr>
                <th>Subject</th>
                <th>Amount</th>
                
            </tr>
        </thead>
        <tbody>
          <tr>
            <td>WLAN ESSID</td>
            <td>xxxx</td>
          </tr>
          <tr>
            <td>WLAN Password</td>
            <td>100</td>
          </tr>
           <tr>
            <td>Phase 1</td>
            <td>100</td>
          </tr>
        </tbody>
	</body>

</body>
</html>
