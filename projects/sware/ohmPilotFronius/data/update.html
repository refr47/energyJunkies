<!DOCTYPE html>
<html>

<head>
    <title>ESP32 OTA Update</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="/css/main.css">
</head>

<body>
    <h2>Firmware Update</h2>
    <form method='POST' action='/update' enctype='multipart/form-data' id='upload_form'>
        <input type='file' name='update' accept='.bin'>
        <input type='submit' value='Update Starten'>
    </form>
    <div id='prg' style='margin-top:20px;'>Fortschritt: 0%</div>

    <script>
    document.getElementById('upload_form').onsubmit = function(e) {
        e.preventDefault();
        var form = document.getElementById('upload_form');
        var data = new FormData(form);
        var req = new XMLHttpRequest();
        
        req.upload.addEventListener('progress', function(ev) {
            if (ev.lengthComputable) {
                var per = Math.round((ev.loaded / ev.total) * 100);
                document.getElementById('prg').innerHTML = 'Fortschritt: ' + per + '%';
            }
        });
        
        req.onload = function() {
            alert(this.responseText);
            if(this.status == 200) window.location.href = '/';
        };
        
        req.open('POST', '/update');
        req.send(data);
    };
    </script>
</body>

</html>
