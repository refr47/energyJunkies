<!DOCTYPE html>
<html lang="de">

<meta http-equiv="content-type" content="text/html; charset=utf-8">
<title>Setup</title>
<div id="backGr"></div>
<link rel="stylesheet" type="text/css" href="css/menu.css" />
<link rel="stylesheet" type="text/css" href="css/main.css" />
<link rel="stylesheet" type="text/css" href="css/datatables.min.css" />
<link rel="stylesheet" type="text/css" href="css/stammdaten.css" />

<script type="text/javascript" src="js/navigation.js"></script>
<script type="text/javascript" src="js/jquery-3.7.1.min.js"></script>
<script src="js/datatables.min.js"></script>
<script src="js/stammdaten.js"></script>

<script>
  document.title = 'Stammdaten';
  document.referrer = 'setup'


  $(document).ready(function () {
    $('#navBar').load('headerF.html #navB');
    $('#backGr').load('headerF.html #backG')
    $('#myFooter').load('headerF.html #myFooter')
    storeDataAjax();
    buildStaticTable();
    //buildDynTable();
    $(".dataTables_filter").hide();
    $('#editBlock').hide();
    initHandler();
    renewTable();
  })


</script>


<body>
  <header>
    <div id="navBar"></div>
  </header>
  <form id="form_store" action="/storeSetup" method="post">
    <div id="H1Block">
      <h1>Stammdaten</h1>
      <input type="submit" value="✔ Speichern!" />

    </div>
    <input type="text" id="errorAjax" hidden />
    <div id="editBlock">
      <label>Titel</label>
      <input type="text" id="theTitle" readonly />
      <label>Ausprägung</label>
      <input type="text" id="theValue" />
      <button id="addRow"> Update </button>
      <input type="text" id="error" hidden>
    </div>
    <table id="stamm" class="display stripe cell-border hover" cellspacing="0" style="width:80%">
 
    </table>
  </form>

</body>

<div id="myFooter"></div>

</html>
