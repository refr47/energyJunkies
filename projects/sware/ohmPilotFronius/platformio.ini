; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = lilygo-t-display-s3
;default_envs = esp32-s3-devkitc-1
[common]
build_flags = 
	 -g3  -Wall -Wextra  -Wstack-protector --param ssp-buffer-size=4 -fstack-clash-protection -ftrapv 
	-D VERSION=0.2
	-I"include/pid"
	-I"include/modbus"
	-I"include/devices"
	-I"include/www"
	-I"include/utils"
	-I"include/weather"
	-DUSE_ESP_IDF_LOG 
	-DCORE_DEBUG_LEVEL=5
	-DLOGFILE_SYS='"/logSYS.txt"'
	-DLOGFILE_INVERTER='"/logInv.txt"'
	-DTAG='"EJunkies"'
	-DEJ1=1
	-DCORS_DEBUG=1
	-DTEST_PID_WWWW=1
	-DMQTT1='"10.0.0.4"'
	-DMODBUS_VERBOSE=1
	-DWEATHER_API='"https://api.open-meteo.com"'
	-DINFLUX='"http://rantanplan-ethernet:8086"'
	-DFRONIUS_IV=1
	-DHUAWEI_IV_=1
	-DAMIS_READER_DEV=1
	-DCARD_READER_=1
	-DVERBOSE
lib_deps_builtin = 
lib_deps_external = 
	emelianov/modbus-esp8266@^4.1.0
	bodmer/TFT_eSPI@^2.5.30
	ottowinter/ESPAsyncWebServer-esphome@^3.0.0
	esphome/AsyncTCP-esphome@^2.0.0
	bblanchon/ArduinoJson@^6.21.3
	fabianoriccardi/ESPLogger@^2.0.0
	paulstoffregen/OneWire@^2.3.7
	milesburton/DallasTemperature@^3.11.0
	arduino-libraries/Arduino_JSON@^0.2.0
	knolleary/PubSubClient@^2.8
	tobiasschuerg/ESP8266 Influxdb@^3.13.1


[env:lilygo-t-display-s3]
platform = espressif32
board = lilygo-t-display-s3
framework = arduino
lib_deps = ${common.lib_deps_external}
build_type = debug
;monitor_filters = default, time, esp32_exception_decoder,colorize
monitor_filters =  
	esp32_exception_decoder
	time
	log2file
board_build.f_cpu = 240000000L
upload_speed = 115200
upload_protocol = esptool
monitor_speed = 115200
board_build.f_flash = 80000000L
board_build.flash_mode = qio
build_flags = 
	${common.build_flags}
	-DESP_LILY_GO



[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
platform_packages = 
	framework-espidf @ https://github.com/espressif/esp-idf.git
framework = arduino
build_type = debug
debug_tool=esp-builtin
monitor_filters =  
	esp32_exception_decoder
	time
	log2file
build_flags = 
	${common.build_flags}
	-DARDUINO_ESP32S3_DEV -DBOARD_HAS_PSRAM -DARDUINO_USB_MODE=1 -DARDUINO_USB_CDC_ON_BOOT=1 -DCORE_DEBUG_LEVEL=1 -DESP_S3
lib_deps = 
	${common.lib_deps_external}
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi
board_build.memory_type = qio_opi
board_build.psram_type = opi
upload_speed = 115200
monitor_speed = 115200
board_build.f_flash = 80000000L
board_build.flash_mode = qio
debug_init_break = tbreak setup
#monitor_port = COM5;/dev/ttyACM0
#upload_port = COM5;/dev/ttyACM0
monitor_port = COM9
upload_port = COM9
debug_port = localhost:3333

