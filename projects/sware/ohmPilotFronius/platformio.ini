; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-s3-devkitc-1

[env:lilygo-t-display-s3]
platform = espressif32
board = lilygo-t-display-s3
framework = arduino
lib_deps = 
	emelianov/modbus-esp8266@^4.1.0
	bodmer/TFT_eSPI@^2.5.30
	ottowinter/ESPAsyncWebServer-esphome@^3.0.0
	esphome/AsyncTCP-esphome@^2.0.0
	bblanchon/ArduinoJson@^6.21.3
board_build.f_cpu = 240000000L
upload_speed = 115200
upload_protocol = esptool
monitor_speed = 115200
board_build.f_flash = 80000000L
board_build.flash_mode = qio
build_flags = -DCORE_DEBUG_LEVEL=0

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_flags = -DARDUINO_ESP32S3_DEV -DBOARD_HAS_PSRAM -DARDUINO_USB_MODE=1 -DARDUINO_USB_CDC_ON_BOOT=1 -DCORE_DEBUG_LEVEL=1 
lib_deps = 
	emelianov/modbus-esp8266@^4.1.0
	bodmer/TFT_eSPI@^2.5.30
	ottowinter/ESPAsyncWebServer-esphome@^3.0.0
	esphome/AsyncTCP-esphome@^2.0.0
	bblanchon/ArduinoJson@^6.21.3
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi
board_build.memory_type = qio_opi
board_build.psram_type = opi 
upload_speed = 115200
#upload_protocol = esptool
monitor_speed = 115200
#monitor_port=/dev/ttyUSB0
board_build.f_flash = 80000000L
board_build.flash_mode = qio
#upload_port = /dev/ttyUSB0
#upload_port = /dev/ttyACM0
debug_init_break = tbreak setup
upload_protocol = esp-builtin
debug_tool = esp-builtin
#debug_build_flags = -ggdb3 -g
#build_type = debug
debug_speed = 15000
#debug_port=/dev/ttyACM0
#debug_server= $PROJECT_PACKAGES_DIR/tool-openocd/bin/openocd -d -f $PROJECT_PACKAGES_DIR/tool-openocd/scripts/board/nordic_nrf52_ftx232.cfg





